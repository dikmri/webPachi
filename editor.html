<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webPachi 盤面エディタ</title>
    <link rel="stylesheet" href="./src/editor/style.css" />
  </head>
  <body>
    <div id="editor-app">
      <header id="editor-header">
        <h1>盤面エディタ <span class="subtitle">P ドリームオーシャン 99ver.</span></h1>
        <a href="./index.html" class="back-link">← 台に戻る</a>
      </header>

      <div id="editor-body">
        <!-- 左: 編集ツール -->
        <aside id="editor-toolbar">
          <section class="panel">
            <h2>ファイル</h2>
            <div class="btn-row">
              <button id="btn-export">JSONをエクスポート</button>
              <button id="btn-import">JSONを読み込む</button>
              <input type="file" id="file-input" accept="application/json,.json" hidden />
            </div>
            <div class="btn-row">
              <button id="btn-reset" class="danger">デフォルトに戻す</button>
              <button id="btn-undo">元に戻す (Ctrl+Z)</button>
            </div>
            <div id="error-box" class="error-box" style="display: none"></div>
          </section>

          <section class="panel">
            <h2>表示切り替え</h2>
            <label class="chk-row">
              <input type="checkbox" id="chk-physical" />
              釘の物理半径を表示
            </label>
            <label class="chk-row">
              <input type="checkbox" id="chk-effective" checked />
              釘の実効半径(釘+玉)を表示<span class="hint">最重要</span>
            </label>
            <label class="chk-row">
              <input type="checkbox" id="chk-ballhit" />
              玉の当たり判定を表示
            </label>
            <label class="chk-row">
              <input type="checkbox" id="chk-snap" />
              グリッドスナップ(2px)
            </label>
          </section>

          <section class="panel">
            <h2>プロパティ</h2>
            <p id="prop-none" class="muted">釘または役物をクリックして選択してください。</p>
            <div id="prop-form" style="display: none">
              <div class="prop-row">
                <span class="prop-label">種類</span>
                <span id="prop-kind" class="prop-value"></span>
              </div>
              <div class="prop-row">
                <label for="prop-x">x</label>
                <input type="number" id="prop-x" step="0.5" />
              </div>
              <div class="prop-row">
                <label for="prop-y">y</label>
                <input type="number" id="prop-y" step="0.5" />
              </div>
              <div class="prop-row" id="prop-r-row" style="display: none">
                <label for="prop-r">半径(空欄=既定)</label>
                <input type="number" id="prop-r" step="0.5" placeholder="2.0" />
              </div>
              <div class="prop-row" id="prop-hw-row" style="display: none">
                <label for="prop-hw">半幅</label>
                <input type="number" id="prop-hw" step="0.5" />
              </div>
              <button id="prop-delete" class="danger" disabled>削除 (Delete)</button>
            </div>
          </section>

          <section class="panel">
            <h2>ステータス</h2>
            <div class="prop-row"><span class="prop-label">釘総数</span><span id="status-nail-count">0</span></div>
            <div class="prop-row"><span class="prop-label">盤面内の玉</span><span id="status-ball-count">0</span></div>
          </section>
        </aside>

        <!-- 中央: キャンバス -->
        <div id="editor-canvas-wrap">
          <canvas id="editor-canvas" width="480" height="660"></canvas>
        </div>

        <!-- 右: テスト発射・簡易シミュレーション・ログ -->
        <aside id="editor-side-panel">
          <section class="panel">
            <h2>テスト発射</h2>
            <div class="prop-row">
              <label for="power-slider">power</label>
              <input type="range" id="power-slider" min="0" max="100" value="60" />
              <span id="power-value">0.60</span>
            </div>
            <div class="btn-row">
              <button id="btn-launch">1発発射</button>
              <label class="chk-row inline">
                <input type="checkbox" id="chk-autofire" />
                オート連射(ハンドル押しっぱなし相当)
              </label>
            </div>
          </section>

          <section class="panel">
            <h2>簡易シミュレーション</h2>
            <div class="prop-row">
              <label for="sim-power">power</label>
              <input type="number" id="sim-power" value="0.6" min="0" max="1" step="0.05" />
            </div>
            <div class="prop-row">
              <label for="sim-shots">発射数</label>
              <input type="number" id="sim-shots" value="300" min="10" max="5000" step="10" />
            </div>
            <button id="btn-quicksim">実行</button>
            <p id="sim-status" class="muted"></p>
            <table id="sim-result" class="sim-table" style="display: none">
              <tbody>
                <tr><th>発射</th><td id="sim-launched">-</td></tr>
                <tr><th>ヘソ</th><td id="sim-heso">-</td></tr>
                <tr><th>電チュー</th><td id="sim-denchu">-</td></tr>
                <tr><th>ゲート</th><td id="sim-gate">-</td></tr>
                <tr><th>一般入賞</th><td id="sim-pocket">-</td></tr>
                <tr><th>アタッカー</th><td id="sim-attacker">-</td></tr>
                <tr><th>アウト</th><td id="sim-out">-</td></tr>
                <tr><th>ヘソ率</th><td id="sim-hesorate">-</td></tr>
                <tr><th>回転/千円(250発)</th><td id="sim-rotation">-</td></tr>
              </tbody>
            </table>
          </section>

          <section class="panel">
            <h2>動作ログ</h2>
            <div class="btn-row">
              <button id="log-dl">ログをダウンロード</button>
            </div>
            <div id="log-view" class="log-view"></div>
          </section>
        </aside>
      </div>
    </div>
    <script type="module" src="./src/editor/main.ts"></script>
  </body>
</html>
